file_version: 1
category:
  id: race
  name: "Race"
  description:
    - "Achievements tied to Race."
  icon: FEATHER
  sort_order: 10

achievements:
  rookie_racer:
    name: "Rookie Racer"
    description:
      - "Finish your first races."
    icon: FEATHER
    phases:
      1:
        name: "First lap"
        description:
          - "Play your first race."
        conditions:
          - "{bluearcade_stat_module_race_games_played} >= 1"
        rewards:
          commands:
            - "baa credits --action=give --target={player} --amount=10"
            - "baa xp --action=give --target={player} --amount=10"
          messages:
            - "  <gold>⛁</gold> <yellow>+10 credits</yellow>"
            - "  <purple>✹</purple> <light_purple>+10 XP</light_purple>"
